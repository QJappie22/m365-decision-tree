<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft 365 - Beslisboom</title>
<link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#0078D4;--lblue:#EEF3FB;
  --purple:#6264A7;--lpurp:#F4F4FF;
  --teal:#038387;--lteal:#EAF7F7;
  --green:#107C10;--lgreen:#EBF3EB;
  --orange:#FFB900;--lorange:#FFF9E6;
  --red:#D83B01;--lred:#FDF0EB;
  --crimson:#A4262C;--lcrim:#FDF1F1;
  --dark:#201F1E;--mid:#605E5C;--light:#F3F2F1;
  --border:#E1DFDD;--white:#fff;
  --navy:#102B6A;
  --sidebar:260px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F0F2FA;display:flex;min-height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--navy);
  height:100vh;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;
  flex-shrink:0;
  position:relative;z-index:50;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}

.sidebar-logo{
  padding:20px 18px 16px;
  border-bottom:1px solid rgba(255,255,255,.12);
}
.logo-dots{display:flex;gap:5px;margin-bottom:10px}
.logo-dot{width:10px;height:10px;border-radius:2px}
.sidebar-logo h1{color:white;font-size:1rem;font-weight:800;line-height:1.3}
.sidebar-logo p{color:rgba(255,255,255,.5);font-size:.72rem;margin-top:2px}

/* ── Sidebar search ── */
.sidebar-search{
  padding:12px 14px 6px;
}
.search-box{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  border-radius:8px;padding:7px 10px;
  transition:border-color .15s ease,background .15s ease;
}
.search-box:focus-within{
  background:rgba(255,255,255,.16);
  border-color:rgba(255,255,255,.45);
}
.search-box i.ms-Icon{font-size:.85rem;color:rgba(255,255,255,.5);flex-shrink:0}
#nav-search{
  flex:1;min-width:0;
  background:none;border:none;outline:none;
  color:white;font-family:inherit;font-size:.8rem;
}
#nav-search::placeholder{color:rgba(255,255,255,.45)}
.search-clear{
  background:none;border:none;cursor:pointer;padding:0;
  color:rgba(255,255,255,.5);font-size:.85rem;line-height:1;
  display:none;flex-shrink:0;
}
.search-clear:hover{color:white}
.search-box.has-text .search-clear{display:block}
.nav-empty{
  display:none;
  padding:14px 18px;color:rgba(255,255,255,.5);
  font-size:.78rem;line-height:1.4;
}

.cat-header{
  padding:10px 18px 6px;
  font-size:.68rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  display:flex;align-items:center;gap:7px;
  margin-top:8px;
}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.tree-btn{
  width:100%;text-align:left;
  padding:8px 18px 8px 30px;
  background:none;border:none;
  color:rgba(255,255,255,.65);
  font-family:inherit;font-size:.8rem;
  cursor:pointer;transition:all .15s ease;
  display:flex;align-items:center;gap:8px;
  line-height:1.3;
}
.tree-btn:hover{background:rgba(255,255,255,.08);color:white}
.tree-btn.active{
  background:rgba(255,255,255,.15);
  color:white;font-weight:700;
}
.tree-btn.active::before{
  content:'';width:3px;height:100%;background:white;
  position:absolute;left:0;border-radius:0 2px 2px 0;
}
.tree-btn{position:relative}
.tree-icon{font-size:.95rem;flex-shrink:0;width:18px;text-align:center}

/* ── Main area ── */
.main{flex:1;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.topbar{
  background:white;border-bottom:1px solid var(--border);
  padding:14px 28px;display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:40;box-shadow:0 1px 4px rgba(0,0,0,.06);
  flex-shrink:0;
}
.menu-btn{
  display:none;background:none;border:none;cursor:pointer;
  font-size:1.2rem;color:var(--mid);padding:2px 6px;
}
.topbar-badge{
  font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:20px;
  color:white;margin-left:auto;white-space:nowrap;
  display:inline-flex;align-items:center;gap:6px;line-height:1;
}
.topbar-badge i.ms-Icon{font-size:.8rem;flex-shrink:0}
#topbar-title{font-size:.95rem;font-weight:700;color:var(--dark)}

/* ── Welcome screen ── */
.welcome{
  padding:40px 32px;max-width:800px;
}
.welcome h2{font-size:1.6rem;font-weight:800;color:var(--dark);margin-bottom:10px}
.welcome p{color:var(--mid);font-size:.95rem;margin-bottom:28px;line-height:1.6}
.welcome-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.welcome-card{
  background:white;border-radius:14px;padding:16px;
  border:2px solid var(--border);cursor:pointer;
  transition:all .18s ease;
}
.welcome-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.wc-icon{font-size:1.6rem;margin-bottom:8px}
.wc-title{font-size:.88rem;font-weight:700;color:var(--dark);margin-bottom:3px}
.wc-sub{font-size:.76rem;color:var(--mid);line-height:1.4}

/* ── Tree card ── */
.tree-area{padding:24px 28px;max-width:800px}
.card{background:white;border-radius:18px;box-shadow:0 2px 16px rgba(0,0,0,.1);overflow:hidden}
.card-header{padding:20px 28px 16px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--light)}
.card-icon-wrap{font-size:2rem;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:13px;flex-shrink:0}
.card-header h2{font-size:1.2rem;font-weight:800;color:var(--dark)}
.card-header p{font-size:.82rem;color:var(--mid);margin-top:3px}
.progress-bar{height:4px;background:var(--light)}
.progress-fill{height:100%;transition:width .4s ease;border-radius:0 2px 2px 0}
.breadcrumb{
  padding:9px 28px;font-size:.74rem;color:var(--mid);
  background:#FAFAFA;border-bottom:1px solid var(--border);
  display:flex;flex-wrap:wrap;gap:4px;align-items:center;
}
.breadcrumb-item{display:flex;align-items:center;gap:4px}
.breadcrumb-item::after{content:"›";color:#C8C6C4}
.breadcrumb-item:last-child::after{display:none}
.bc-label{font-weight:700;color:var(--dark)}
.bc-value{color:var(--mid);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-content{padding:26px 28px}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Question ── */
.question-wrap{animation:fadeUp .25s ease}
.step-num{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--mid);margin-bottom:7px}
.question-text{font-size:1.35rem;font-weight:800;color:var(--dark);line-height:1.35;margin-bottom:22px}
.options{display:flex;flex-direction:column;gap:10px}
.option-btn{
  background:white;border:2px solid var(--border);border-radius:13px;
  padding:14px 18px;text-align:left;cursor:pointer;
  transition:all .17s ease;display:flex;align-items:center;gap:13px;
  font-family:inherit;font-size:.93rem;color:var(--dark);line-height:1.35;
}
.option-btn:hover{border-color:#6264A7;background:#F8F7FF;transform:translateX(4px);box-shadow:0 2px 10px rgba(98,100,167,.15)}
.opt-icon{font-size:1.4rem;flex-shrink:0;width:34px;text-align:center}
.opt-content{flex:1}
.opt-label{font-weight:700;display:block}
.opt-sub{font-size:.78rem;color:var(--mid);display:block;margin-top:2px}
.opt-arrow{color:#C8C6C4;font-size:1.2rem;flex-shrink:0}
.back-row{margin-top:18px}

/* ── Result ── */
.result-wrap{animation:fadeUp .25s ease}
.result-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px;color:white}
.result-main{display:flex;align-items:flex-start;gap:16px;padding:20px;border-radius:14px;margin-bottom:18px}
.result-icon-big{font-size:2.4rem;width:58px;height:58px;display:flex;align-items:center;justify-content:center;border-radius:13px;background:rgba(255,255,255,.82);flex-shrink:0}
.result-info h3{font-size:1.45rem;font-weight:800;color:white;margin-bottom:6px}
.result-info p{font-size:.88rem;color:rgba(255,255,255,.92);line-height:1.6}
.tips{background:var(--light);border-radius:12px;padding:16px 20px;margin-bottom:16px}
.tips h4{font-size:.83rem;font-weight:800;color:var(--dark);margin-bottom:9px}
.tips ul{list-style:none;display:flex;flex-direction:column;gap:7px}
.tips li{font-size:.84rem;color:var(--mid);display:flex;gap:9px;line-height:1.5}
.tips li::before{content:"✓";color:var(--green);font-weight:800;flex-shrink:0}
.location-strip{background:#F3F2F1;border-radius:9px;padding:10px 15px;margin-bottom:18px;font-size:.8rem;color:var(--mid);display:flex;align-items:center;gap:9px}
.btn-row{display:flex;gap:9px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:9px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .17s ease;border:none;display:flex;align-items:center;gap:7px}
.btn-primary{background:#0078D4;color:white}
.btn-primary:hover{background:#106EBE;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,120,212,.35)}
.btn-secondary{background:var(--light);color:var(--dark)}
.btn-secondary:hover{background:var(--border)}

/* ── Sidebar overlay (mobile) ── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}

@media(max-width:700px){
  .sidebar{position:fixed;left:-100%;transition:left .25s ease;z-index:50}
  .sidebar.open{left:0}
  .sidebar-overlay.open{display:block}
  .menu-btn{display:block}
  .main{width:100vw}
  .tree-area{padding:16px}
  .tree-content{padding:20px}
  .question-text{font-size:1.1rem}
}

/* ── Fabric / Fluent icon sizing ── */
i.ms-Icon{display:inline-block;font-style:normal;vertical-align:middle;line-height:1}
.opt-icon i.ms-Icon{font-size:1.25rem}
.tree-icon i.ms-Icon{font-size:1rem}
.wc-icon i.ms-Icon{font-size:1.55rem}
.card-icon-wrap i.ms-Icon{font-size:1.9rem}
.result-icon-big i.ms-Icon{font-size:2.2rem;color:rgba(255,255,255,.95)}
.cat-header i.ms-Icon{font-size:.85rem;opacity:.7}
.result-badge i.ms-Icon{font-size:.75rem}
.location-strip i.ms-Icon{font-size:1rem;flex-shrink:0;color:var(--mid)}
.tips h4 i.ms-Icon{font-size:.9rem;color:var(--green)}
.btn i.ms-Icon{font-size:.9rem}
</style>
</head>

<main class="main">

    <button onclick="goHome()" title="Terug naar startpagina" style="background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--mid);padding:2px 6px;line-height:1;flex-shrink:0" id="home-btn"><i class="ms-Icon ms-Icon--Home"></i></button>

</main>

// ================================================================
// SHADING UTIL
// ================================================================
function shade(hex,pct){const n=parseInt(hex.replace('#',''),16),a=Math.round(2.55*pct);const R=Math.min(255,Math.max(0,(n>>16)+a)),G=Math.min(255,Math.max(0,(n>>8&0xFF)+a)),B=Math.min(255,Math.max(0,(n&0xFF)+a));return '#'+(0x1000000+R*0x10000+G*0x100+B).toString(16).slice(1)}

// ================================================================
// STATE
// ================================================================
let currentTreeId = null;
let currentNode   = 'start';
let history       = [];

// ================================================================
// FABRIC ICON RENDERER
// All `icon` values in the data are Microsoft Fabric (Fluent UI)
// icon class names, e.g. "EventDate" -> ms-Icon--EventDate.
// Browse names at https://uifabricicons.azurewebsites.net/
// Note: avoid "Calendar" — it is defined twice in fabric-core
// 11.0.0 and the cascade resolves it to the wrong glyph.
// ================================================================
function ic(name, size) {
  if (!name) return '';
  const s = size ? ` style="font-size:${size}"` : '';
  return `<i class="ms-Icon ms-Icon--${name}"${s}></i>`;
}

// ================================================================
// BUILD SIDEBAR NAV
// ================================================================
function buildNav(){
  const nav = document.getElementById('nav');
  categories.forEach(cat=>{
    const hdr = document.createElement('div');
    hdr.className = 'cat-header';
    hdr.id = 'cathdr-'+cat.id;
    hdr.innerHTML = `<div class="cat-dot" style="background:${cat.color}"></div><span style="color:rgba(255,255,255,.55)">${ic(cat.icon)} ${cat.label}</span>`;
    nav.appendChild(hdr);
    cat.trees.forEach(tid=>{
      const info = treeLabels[tid];
      const btn = document.createElement('button');
      btn.className = 'tree-btn';
      btn.id = 'nav-'+tid;
      btn.innerHTML = `<span class="tree-icon">${ic(info.icon)}</span>${info.label}`;
      btn.onclick = ()=>{ loadTree(tid); closeSidebar(); };
      nav.appendChild(btn);
    });
  });
}

// ================================================================
// SEARCH / FILTER NAV
// ================================================================
// Pre-built per-tree index of all searchable text (questions,
// option labels/subs, result titles/descriptions/tips/locations).
const searchIndex = {};
function buildSearchIndex(){
  Object.keys(trees).forEach(tid=>{
    const tree = trees[tid];
    const parts = [
      treeLabels[tid].label,
      tree.meta.title, tree.meta.subtitle
    ];
    Object.values(tree.nodes).forEach(node=>{
      if(node.question)    parts.push(node.question);
      if(node.stepLabel)   parts.push(node.stepLabel);
      if(node.title)       parts.push(node.title);
      if(node.description) parts.push(node.description);
      if(node.location)    parts.push(node.location);
      if(node.tips)        parts.push(node.tips.join(' '));
      if(node.options) node.options.forEach(o=>{
        parts.push(o.label);
        if(o.sub) parts.push(o.sub);
      });
    });
    searchIndex[tid] = parts.join(' ').toLowerCase();
  });
}

function filterNav(raw){
  const q = (raw||'').trim().toLowerCase();
  document.getElementById('search-box').classList.toggle('has-text', q.length>0);

  let anyVisible = false;
  categories.forEach(cat=>{
    const catMatch = cat.label.toLowerCase().includes(q);
    let catHasVisible = false;
    cat.trees.forEach(tid=>{
      const btn = document.getElementById('nav-'+tid);
      if(!btn) return;
      const show = !q || catMatch || (searchIndex[tid] || '').includes(q);
      btn.style.display = show ? '' : 'none';
      if(show) catHasVisible = true;
    });
    document.getElementById('cathdr-'+cat.id).style.display = catHasVisible ? '' : 'none';
    if(catHasVisible) anyVisible = true;
  });

  document.getElementById('nav-empty').style.display = anyVisible ? 'none' : 'block';
}

function clearSearch(){
  const input = document.getElementById('nav-search');
  input.value = '';
  filterNav('');
  input.focus();
}

// ================================================================
// LOAD TREE
// ================================================================
function loadTree(tid){
  // Deactivate previous
  if(currentTreeId) document.getElementById('nav-'+currentTreeId)?.classList.remove('active');
  currentTreeId = tid;
  currentNode   = 'start';
  history       = [];
  document.getElementById('nav-'+tid)?.classList.add('active');

  const tree = trees[tid];
  const cat  = categories.find(c=>c.trees.includes(tid));

  // Update topbar
  document.getElementById('topbar-title').textContent = treeLabels[tid].label;
  const badge = document.getElementById('topbar-badge');
  badge.style.display = 'inline-flex';
  badge.style.background = cat.color;
  badge.innerHTML = ic(cat.icon) + '<span>' + cat.label + '</span>';

  renderContent();
}

// ================================================================
// RENDER
// ================================================================
function renderContent(){
  const tree = trees[currentTreeId];
  const node = tree.nodes[currentNode];

  document.getElementById('content').innerHTML = `
    <div class="tree-area">
      <div class="card">
        <div class="card-header">
          <div class="card-icon-wrap" style="background:${tree.meta.iconBg||'#EEF3FB'};color:${tree.meta.color}">${ic(tree.meta.icon)}</div>
          <div>
            <h2>${tree.meta.title}</h2>
            <p>${tree.meta.subtitle}</p>
          </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="pfill" style="background:${tree.meta.color};width:${progressPct(node)}%"></div></div>
        <div class="breadcrumb" id="bc" style="display:${history.length?'flex':'none'}">${buildBreadcrumb()}</div>
        <div class="tree-content" id="tc"></div>
      </div>
    </div>`;

  if(node.result) renderResult(node, tree.meta.color);
  else renderQuestion(node);
}

function progressPct(node){
  if(node.result) return 100;
  return Math.min(history.length/5,0.88)*100;
}

function buildBreadcrumb(){
  return history.map(h=>`
    <div class="breadcrumb-item">
      <span class="bc-label">${h.stepLabel}:</span>
      <span class="bc-value" title="${h.choice}">${h.choice}</span>
    </div>`).join('');
}

function renderQuestion(node){
  document.getElementById('tc').innerHTML = `
    <div class="question-wrap">
      <div class="step-num">Stap ${history.length+1}</div>
      <div class="question-text">${node.question}</div>
      <div class="options">${node.options.map((o,i)=>`
        <button class="option-btn" onclick="choose(${i})">
          <span class="opt-icon">${o.icon ? ic(o.icon) : '<i class="ms-Icon ms-Icon--ChevronRight"></i>'}</span>
          <span class="opt-content">
            <span class="opt-label">${o.label}</span>
            ${o.sub?`<span class="opt-sub">${o.sub}</span>`:''}
          </span>
          <span class="opt-arrow"><i class="ms-Icon ms-Icon--ChevronRight"></i></span>
        </button>`).join('')}
      </div>
      ${history.length?`<div class="back-row"><button class="btn btn-secondary" onclick="goBack()"><i class="ms-Icon ms-Icon--ChevronLeft"></i> Vorige stap</button></div>`:''}
    </div>`;
}

function renderResult(node, fallbackColor){
  const color = node.color || fallbackColor;
  document.getElementById('tc').innerHTML = `
    <div class="result-wrap">
      <div class="result-badge" style="background:${color}"><i class="ms-Icon ms-Icon--Accept"></i> Aanbeveling</div>
      <div class="result-main" style="background:linear-gradient(135deg,${color},${shade(color,-24)})">
        <div class="result-icon-big">${node.icon ? ic(node.icon) : '<i class="ms-Icon ms-Icon--Accept"></i>'}</div>
        <div class="result-info">
          <h3>${node.title}</h3>
          <p>${node.description}</p>
        </div>
      </div>
      ${node.tips?`
      <div class="tips" style="border-left:4px solid ${color}">
        <h4><i class="ms-Icon ms-Icon--Lightbulb"></i> Zo pak je het aan</h4>
        <ul>${node.tips.map(t=>`<li>${t}</li>`).join('')}</ul>
      </div>`:''}
      ${node.location?`
      <div class="location-strip">
        <i class="ms-Icon ms-Icon--Location"></i>
        <div><strong>Locatie in Microsoft 365:</strong> ${node.location}</div>
      </div>`:''}
      <div class="btn-row">
        <button class="btn btn-primary" onclick="resetTree()"><i class="ms-Icon ms-Icon--Refresh"></i> Opnieuw beginnen</button>
        ${history.length?`<button class="btn btn-secondary" onclick="goBack()"><i class="ms-Icon ms-Icon--ChevronLeft"></i> Vorige stap</button>`:''}
      </div>
    </div>`;
}

// ================================================================
// NAVIGATION
// ================================================================
function choose(i){
  const node = trees[currentTreeId].nodes[currentNode];
  const opt  = node.options[i];
  history.push({ node:currentNode, stepLabel:node.stepLabel||'Keuze', choice:opt.label });
  currentNode = opt.next;
  renderContent();
  document.querySelector('.main').scrollTo({top:0,behavior:'smooth'});
}
function goBack(){
  if(!history.length) return;
  currentNode = history.pop().node;
  renderContent();
}
function resetTree(){
  history=[]; currentNode='start'; renderContent();
  document.querySelector('.main').scrollTo({top:0,behavior:'smooth'});
}

// ================================================================
// SIDEBAR TOGGLE
// ================================================================
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ================================================================
// WELCOME SCREEN
// ================================================================
function goHome(){
  if(currentTreeId){ document.getElementById('nav-'+currentTreeId)?.classList.remove('active'); currentTreeId=null; }
  document.getElementById('topbar-title').textContent='Kies een onderwerp';
  document.getElementById('topbar-badge').style.display='none';
  showWelcome();
  closeSidebar();
}
function showWelcome(){
  const cards = categories.flatMap(cat=>
    cat.trees.map(tid=>({tid, cat,
      icon:treeLabels[tid].icon,
      label:treeLabels[tid].label,
      color:cat.color
    }))
  );
  document.getElementById('content').innerHTML = `
    <div class="welcome">
      <h2>Welkom - kies een onderwerp</h2>
      <p>Kies een beslisboom via het menu links, of klik op een onderwerp hieronder.<br>
      Elke boom begeleidt je stap voor stap naar het juiste antwoord voor jouw situatie.</p>
      <div class="welcome-grid">
        ${cards.map(c=>`
          <div class="welcome-card" onclick="loadTree('${c.tid}')" style="border-top:3px solid ${c.color}">
            <div class="wc-icon">${ic(c.icon)}</div>
            <div class="wc-title">${c.label}</div>
            <div class="wc-sub" style="color:${c.color}">${c.cat.label}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

// ================================================================
// INIT
// ================================================================
buildNav();
buildSearchIndex();
showWelcome();
</script>
</body>
</html>
